version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: walmart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-walmart_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-walmart_pass}
      POSTGRES_DB: ${DB_NAME:-walmart_sales}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-walmart_user} -d ${DB_NAME:-walmart_sales}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: walmart_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-walmart_user}
      DB_PASSWORD: ${DB_PASSWORD:-walmart_pass}
      DB_NAME: ${DB_NAME:-walmart_sales}
      CSV_PATH: /app/data/Walmart_Sales.csv
    volumes:
      - ./data:/app/data:ro

volumes:
  pgdata:
